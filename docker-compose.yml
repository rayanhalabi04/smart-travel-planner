version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: smart_travel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_travel_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: